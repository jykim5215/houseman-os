<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#faf7f2">
<title>하우스맨 노트</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#2f8f83"/><stop offset="1" stop-color="#c9863f"/>
  </linearGradient>
  <symbol id="logo" viewBox="0 0 48 48">
    <rect x="2" y="2" width="44" height="44" rx="13" fill="url(#lg)"/>
    <path d="M9 31 L18 18 L23 25 L28 15 L39 31 Z" fill="#fff" fill-opacity=".95"/>
    <path d="M8 34c4 0 4-2.4 8-2.4S20 34 24 34s4-2.4 8-2.4 4 2.4 8 2.4" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-opacity=".9"/>
  </symbol>
  <symbol id="i-talk" viewBox="0 0 24 24"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v5A2.5 2.5 0 0 1 17.5 14H9l-4 3.5V6.5z"/><path d="M8.5 9h7M8.5 11.5h4"/></symbol>
  <symbol id="i-chat" viewBox="0 0 24 24"><path d="M12 3.5l1.7 4.3 4.3 1.7-4.3 1.7L12 15.5l-1.7-4.3L6 9.5l4.3-1.7zM18.5 15l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8z"/></symbol>
  <symbol id="i-data" viewBox="0 0 24 24"><rect x="3.5" y="4.5" width="17" height="15" rx="2.5"/><path d="M3.5 9.5h17M9.5 9.5V19.5"/></symbol>
  <symbol id="i-studio" viewBox="0 0 24 24"><path d="M6 4.5h9l4 4V19.5H6zM15 4.5V9h4"/><path d="M9 13h6M9 16h4"/></symbol>
  <symbol id="i-book" viewBox="0 0 24 24"><path d="M5 4.5h11a2 2 0 0 1 2 2v13H7a2 2 0 0 1-2-2z"/><path d="M18 17.5H7a2 2 0 0 0-2 2"/></symbol>
  <symbol id="i-chev" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5"/></symbol>
  <symbol id="i-alert" viewBox="0 0 24 24"><path d="M12 4.5 21 19.5H3zM12 10v4M12 16.8v.4"/></symbol>
  <symbol id="i-mic" viewBox="0 0 24 24"><rect x="9.5" y="4" width="5" height="10" rx="2.5"/><path d="M6 12a6 6 0 0 0 12 0M12 18v2.5"/></symbol>
  <symbol id="i-send" viewBox="0 0 24 24"><path d="M5 12L20 5l-4.5 7L20 19zM20 5 8.8 12"/></symbol>
  <symbol id="i-doc" viewBox="0 0 24 24"><path d="M6.5 3.5h7L18 8v12.5h-11.5z M13 3.5V8.5H18M9.5 12.5h5M9.5 15.8h5"/></symbol>
  <symbol id="i-note" viewBox="0 0 24 24"><path d="M4.5 6.5h15M4.5 12h15M4.5 17.5h9"/></symbol>
  <symbol id="i-brief" viewBox="0 0 24 24"><path d="M8 6.5V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1.5"/><rect x="3.5" y="6.5" width="17" height="13" rx="3"/><path d="M3.5 12h17"/></symbol>
  <symbol id="i-report" viewBox="0 0 24 24"><rect x="4.5" y="3.5" width="15" height="17" rx="2.5"/><path d="M8.5 14.5l2.2-2.6 2 1.6 2.8-3.4M8 8h8"/></symbol>
  <symbol id="i-hist" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 7v5l3.5 2"/></symbol>
  <symbol id="i-lang" viewBox="0 0 24 24"><path d="M4 6h8M8 4v2M6 6c.7 3.6 3 6.6 6 8M10.5 6C9.6 9.6 7.4 12.6 4.5 14M12.5 20l4-9 4 9M13.8 17h5.4"/></symbol>
  <symbol id="i-add" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
  <symbol id="i-gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 3.5v2.4M12 18.1v2.4M3.5 12h2.4M18.1 12h2.4M6 6l1.7 1.7M16.3 16.3 18 18M18 6l-1.7 1.7M7.7 16.3 6 18"/></symbol>
  <symbol id="i-sync" viewBox="0 0 24 24"><path d="M19 12a7 7 0 0 1-12.2 4.7M5 12a7 7 0 0 1 12.2-4.7M6.8 16.7 5 20M6.8 16.7 3.2 16M17.2 7.3 19 4M17.2 7.3l3.6.7"/></symbol>
  <symbol id="i-undo" viewBox="0 0 24 24"><path d="M7.5 5.5 4 9l3.5 3.5M4 9h10a6 6 0 0 1 0 12h-3"/></symbol>
  <symbol id="i-image" viewBox="0 0 24 24"><rect x="3.5" y="4.5" width="17" height="15" rx="2.5"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M4 17l5-4.5 4 3.2L16 12l4 3.5"/></symbol>
  <symbol id="i-cam" viewBox="0 0 24 24"><path d="M3.5 8.5A2 2 0 0 1 5.5 6.5h2L9 4.5h6l1.5 2h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-13a2 2 0 0 1-2-2z"/><circle cx="12" cy="13" r="3.5"/></symbol>
  <symbol id="i-lock" viewBox="0 0 24 24"><rect x="5" y="10.5" width="14" height="9.5" rx="2.5"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"/></symbol>
  <symbol id="i-pin" viewBox="0 0 24 24"><path d="M9 3.5h6l-1 6 3 3v2H7v-2l3-3z M12 14.5V21"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7"/></symbol>
  <symbol id="i-radio" viewBox="0 0 24 24"><rect x="7" y="6" width="10" height="14.5" rx="2.5"/><path d="M12 6V3M9.8 10h4.4"/></symbol>
  <symbol id="i-key" viewBox="0 0 24 24"><circle cx="8.5" cy="9" r="4.5"/><path d="M11.8 12.3 20 20.5M16.5 17l2-2"/></symbol>
  <symbol id="i-wrench" viewBox="0 0 24 24"><path d="M14.5 6.5a4.5 4.5 0 0 0-6 6L4 17l3 3 4.5-4.5a4.5 4.5 0 0 0 6-6L14 13l-2.5-2.5z"/></symbol>
</defs></svg>

<div class="updbar hide" id="updBar">새 버전이 있습니다 <button id="updGo">지금 업데이트</button></div>

<header>
  <svg class="brand" viewBox="0 0 48 48"><use href="#logo"/></svg>
  <button class="bldpick" id="bldBtn"><span id="bldName">오크동</span><svg class="ic sm"><use href="#i-chev"/></svg></button>
  <div class="grow"></div>
  <button class="iconbtn" id="syncBtn" title="동기화"><svg class="ic"><use href="#i-sync"/></svg></button>
  <button class="iconbtn" id="gearBtn" title="설정"><svg class="ic"><use href="#i-gear"/></svg></button>
  <button class="namechip" id="workerChip">로그인</button>
</header>

<main>
  <!-- 톡 -->
  <div class="tabview" id="tab-talk">
    <div class="feed" id="feed"></div>
    <div class="talkbar">
      <div class="talktypes" id="talkTypes">
        <button data-t="text" class="on">일반</button>
        <button data-t="notice">공지</button>
        <button data-t="done">완료보고</button>
      </div>
      <div class="talkinput">
        <button class="rbtn" id="camBtn" title="카메라로 촬영"><svg class="ic"><use href="#i-cam"/></svg></button>
        <button class="rbtn" id="attachBtn" title="사진 첨부"><svg class="ic"><use href="#i-image"/></svg></button>
        <input type="file" id="fileInput" accept="image/*" hidden>
        <input type="file" id="camInput" accept="image/*" capture="environment" hidden>
        <input type="text" id="talkText" placeholder="메시지" autocomplete="off">
        <button class="rbtn send" id="talkSend"><svg class="ic"><use href="#i-send"/></svg></button>
      </div>
    </div>
  </div>

  <!-- 챗 (AI) -->
  <div class="tabview on" id="tab-chat">
    <div class="modebar">
      <div class="modeseg">
        <button data-m="ask" class="on" id="mAsk">묻기</button>
        <button data-m="admin" id="mAdmin"><svg class="ic sm"><use href="#i-lock"/></svg>관리</button>
      </div>
      <span class="modehint" id="modeHint">읽기 전용 — 자료·현황을 물어보세요</span>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="cmdbar"><div class="expand" id="xp"><div id="xpBody"></div></div><div class="counters" id="counters"></div></div>
    <div class="composer">
      <div class="sugg" id="sugg">
        <button>오늘 브리핑</button><button>부족한 재고 알려줘</button><button>미반납 장비 있어?</button>
      </div>
      <div class="inputbar">
        <input placeholder="질문하세요" id="inp" autocomplete="off">
        <button class="rbtn" id="micBtn" title="음성"><svg class="ic"><use href="#i-mic"/></svg></button>
        <button class="rbtn send" id="sendBtn"><svg class="ic"><use href="#i-send"/></svg></button>
      </div>
    </div>
  </div>

  <!-- 데이터 -->
  <div class="tabview" id="tab-data">
    <div class="datawrap">
      <div class="seg" id="seg">
        <button data-c="stock" class="on">재고</button>
        <button data-c="equipment">장비</button>
        <button data-c="lost">습득물</button>
        <button data-c="defects">하자</button>
      </div>
      <div id="dataHost"></div>
      <div class="srchead"><h2>지식 소스</h2><span class="meta">체크 = 챗 참조</span>
        <button class="add" id="srcAddBtn"><svg class="ic sm"><use href="#i-add"/></svg>추가</button></div>
      <div id="srcList"></div>
    </div>
  </div>

  <!-- 스튜디오 -->
  <div class="tabview" id="tab-studio">
    <div class="studio">
      <div class="scard" id="scQuick">
        <div class="top"><div class="icbox"><svg class="ic"><use href="#i-doc"/></svg></div>
          <div><h3>현장 카드</h3><p>비밀번호 · 전화번호 · 창고 등 자주 찾는 정보</p></div></div>
        <div id="quickBody" style="margin-top:12px"></div>
      </div>
      <div class="scard" id="scBrief">
        <div class="top"><div class="icbox"><svg class="ic"><use href="#i-brief"/></svg></div>
          <div><h3>교대 브리핑</h3><p>미반납·부족·하자·습득물·공지 요약</p></div>
          <button class="btn filled go" id="briefGen">생성</button></div>
        <div class="out" id="briefOut"></div>
      </div>
      <div class="scard" id="scTalk">
        <div class="top"><div class="icbox"><svg class="ic"><use href="#i-talk"/></svg></div>
          <div><h3>대화 요약</h3><p>오늘 톡 · 공지 · 완료보고 정리</p></div>
          <button class="btn filled go" id="talkSum">생성</button></div>
        <div class="out" id="talkSumOut"></div>
      </div>
      <div class="scard">
        <div class="top"><div class="icbox"><svg class="ic"><use href="#i-report"/></svg></div>
          <div><h3>일일 마감 리포트</h3><p>당일 변경 요약 · CSV</p></div>
          <button class="btn go" id="dailyBtn">내보내기</button></div>
      </div>
      <div class="scard">
        <div class="top"><div class="icbox"><svg class="ic"><use href="#i-hist"/></svg></div>
          <div><h3>감사 로그</h3><p>모든 변경 기록 · 취소 가능</p></div>
          <button class="btn go" id="logToggle">보기</button></div>
        <div class="out" id="logOut"></div>
      </div>
    </div>
  </div>
</main>

<nav>
  <button data-tab="talk"><span class="box"><svg class="ic"><use href="#i-talk"/></svg></span>톡</button>
  <button class="on" data-tab="chat"><span class="box"><svg class="ic"><use href="#i-chat"/></svg></span>챗</button>
  <button data-tab="data"><span class="box"><svg class="ic"><use href="#i-data"/></svg></span>데이터</button>
  <button data-tab="studio"><span class="box"><svg class="ic"><use href="#i-studio"/></svg></span>스튜디오</button>
</nav>

<div class="sheetbg hide" id="sheetbg"></div>
<div class="sheet" id="sheet"><div class="grab"></div><div id="sheetBody"></div></div>

<script src="store.js"></script>
<script src="logic.js"></script>
<script src="ai.js"></script>
<script src="app.js"></script>
</body>
</html>
